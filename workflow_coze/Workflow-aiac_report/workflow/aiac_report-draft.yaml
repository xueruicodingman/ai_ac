    - id: "163938"
      type: llm
      title: 报告优化
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-LLM-v2.jpg
      description: "调用大语言模型,使用变量和提示词生成回复"
      version: "3"
      position:
        x: 2680
        y: 19
      parameters:
        fcParamVar:
            knowledgeFCParam: {}
        llmParam:
            - name: apiMode
              input:
                type: integer
                value: "0"
            - name: temperature
              input:
                type: float
                value: "0.5"
            - name: topP
              input:
                type: float
                value: "1"
            - name: frequencyPenalty
              input:
                type: float
                value: "0"
            - name: maxTokens
              input:
                type: integer
                value: "4096"
            - name: spCurrentTime
              input:
                type: boolean
                value: false
            - name: spAntiLeak
              input:
                type: boolean
                value: false
            - name: thinkingType
              input:
                type: string
                value: enabled
            - name: responseFormat
              input:
                type: integer
                value: "2"
            - name: modelName
              input:
                type: string
                value: 豆包·1.8·深度思考
            - name: modelType
              input:
                type: integer
                value: "1768187121"
            - name: generationDiversity
              input:
                type: string
                value: balance
            - name: parameters
              input:
                type: object
                properties:
                    max_completion_tokens:
                        type: integer
                        value: "0"
                    reasoning_effort:
                        type: string
                        value: medium
                value: null
            - name: prompt
              input:
                type: string
                value: 报告初稿：{{input}}
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: |-
                    你是一个报告优化专家，你会基于报告出现的漏洞去对报告做优化。

                    # 输入
                    报告初稿：{{input}}
                    # 优化原则
                    1. 【定位漏洞类型】：对输入材料中【漏洞分析】进行分析，定位是以下哪一类漏洞
                    *评价语与评价标准不相关*：并没有围绕评价标准去做评价
                    *行为表现不能支撑评价语*：无法通过行为评价得出相应的评价语吗，或者可能也可以其他的评价
                    2. 【漏洞优化】
                    针对*评价语与评价标准不相关*型漏洞，优化逻辑如下：
                    第一步：对评价标准拆分成若干个细分标准；
                    第二步：分析与行为表现相关的细分标准；
                    第三步：围绕该细分标准重新撰写评价语；
                    针对*行为表现不能支撑评价语*型漏洞，优化逻辑如下：
                    第一步：基于行为表现提取出若干个可靠的评价结论；
                    第二步：提取出与评价标准相关的评价结论；
                    第三步：将该评价结论结论语句润色后座位最后的评价语；
                    3. 不改变原文结构，不做大规模的调整和修改
                    4.  漏洞优化后即可删除漏洞分析部分的内容，保留洽谈内容
                    # 输出
                    1. 完全按照{{input}}的结构输出，在原有文字的基础上新增、修改内容，进行一版本优化
                    2. 输出中不要遗漏任何一个考生代号
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: input
              input:
                value:
                    path: output
                    ref_node: "102166"
        node_outputs:
            output:
                type: string
                value: null
            reasoning_content:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 600000
