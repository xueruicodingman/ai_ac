                    # 输出要求
                    输出管理层级、管理层级对应的管理职责，每一条职责不超过30字
                    # 输出示例
                    管理层级：基层经理
                    管理职责：
                    1. 落实公司战略与部门目标，分解任务至下属，确保高效落地。
                    2. 带领团队完成业绩指标，监督工作进度，及时纠偏补位。
                    3. 负责下属日常管理、考勤考核，规范工作流程与行为。
                    4. 开展下属岗前培训、技能指导，助力团队能力提升。
                    5. 协调跨岗位 / 跨部门协作，解决团队工作中的常规问题。
