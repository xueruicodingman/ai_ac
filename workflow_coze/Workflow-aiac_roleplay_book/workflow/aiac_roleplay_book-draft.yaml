    - id: "198460"
      type: llm
      title: 考察工具挑战点设计
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-LLM-v2.jpg
      description: "调用大语言模型,使用变量和提示词生成回复"
      version: "3"
      position:
        x: 1200
        y: 263.20000000000005
      parameters:
        fcParamVar:
            knowledgeFCParam: {}
        llmParam:
            - name: modelType
              input:
                type: integer
                value: "1768187121"
            - name: modelName
              input:
                type: string
                value: 豆包·1.8·深度思考
            - name: generationDiversity
              input:
                type: string
                value: balance
            - name: temperature
              input:
                type: float
                value: "0.5"
            - name: topP
              input:
                type: float
                value: "1"
            - name: frequencyPenalty
              input:
                type: float
                value: "0"
            - name: maxTokens
              input:
                type: integer
                value: "4096"
            - name: spCurrentTime
              input:
                type: boolean
                value: false
            - name: spAntiLeak
              input:
                type: boolean
                value: false
            - name: responseFormat
              input:
                type: integer
                value: "2"
            - name: parameters
              input:
                type: object
                properties:
                    max_completion_tokens:
                        type: integer
                        value: "0"
                value: null
            - name: prompt
              input:
                type: string
                value: 考察能力为：{{ability}}
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: |
                    你是一个人才评估专家，你能够基于需要考察的能力和考察的工具的挑战点来设计适合该工具的关键矛盾。
                    # 输入内容
                    ## 考察工具的挑战点
                    1. 指令模糊
                    布置工作时重点不清、标准不明，下级难以执行，体现不出管理清晰度。
                    2. 沟通生硬
                    语气强势、缺乏引导，只会压任务不做解释，容易引发对立情绪。
                    3. 缺乏倾听
                    只顾下达要求，不听取下级困难与建议，显得独断且不接地气。
                    4. 问题处理简单化
                    下级提出问题时只会批评或催促，不会分析原因、给出方法。
                    5. 分寸失衡
                    要么过于温和没权威，要么过于严厉不近人情，管理尺度把握不准。
                    6. 应变不足
                    面对下级反驳、推诿或突发状况，容易慌乱、语塞或情绪失控。
                    7. 目标拆解不足
                    只会提整体要求，不会把任务拆成可落地步骤，下级无从下手。
                    8. 激励与施压失衡
                    要么只批评不鼓励，要么只安抚不推动，无法有效调动下级积极性。
                    9. 边界感模糊
                    过度插手细节或放任不管，管得太死或太松，管理节奏混乱。
                    10. 矛盾回避
                    遇到下级推诿、意见不合时不敢直面冲突，绕开问题不解决。
                    11. 决策犹豫
                    面对下级请示或争议时反复不定，缺乏果断性与决断力。
                    12. 反馈无效
                    只说 “不行”“重做”，不指出具体问题和改进方向，指导价值低。
                    ## 考察能力
                    考察能力为：{{ability}}
                    # 输出要求
                    1. 针对每一个考察的能力设计出1-2个挑战点，每个挑战点不超过80字
                    2. 要结合所考察能力的内涵
                    # 输出要求
                    能力和挑战点都需要有，包括胜任力（能力名称、能力含义、关键行为）和对应的挑战点；
                    # 输出示例
                    示例如下：
                    能力名称：解决问题
                    能力含义：指在面对工作任务中的障碍与挑战时，能够主动识别关键矛盾，运用逻辑分析与创新思维，制定有效策略并协调资源推动实施，最终消除障碍、达成目标的心理特质与行为表现。
                    关键行为：
                    1. 深度剖析：面对复杂工作或突发异常时，能迅速捕捉关键信息，通过数据比对、现场调研等方式深入挖掘问题背后的根本原因，避免主观臆断或仅处理表面现象。
                    2. 科学决策：基于根因分析设计至少 2 种针对性解决方案，评估可行性与风险，协调各方资源确保方案具备落地条件，明确责任分工与时间节点。
                    3. 结果导向：在执行过程中监控关键节点，及时纠偏应对突发状况，确保问题解决彻底，并形成标准化流程或案例沉淀防止复发。
                    挑战点：
                    1. 问题表层化陷阱：讨论易停留在表面症状，需主动挖掘根本原因，考察深度剖析、拒绝主观臆断的问题分析能力。
                    2. 单一方案依赖：组员易局限一种思路，需主动提出多方案并评估风险可行性，考察科学决策与策略设计能力。
                    3. 只议不落地偏差：讨论偏重观点争论，需明确分工、节点与落地条件并监控闭环，考察结果导向与问题根治能力。
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: ability
              input:
                value:
                    path: ability
                    ref_node: "100001"
        node_outputs:
            output:
                type: string
                value: null
            reasoning_content:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 180000
