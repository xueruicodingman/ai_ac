    - id: "198460"
      type: llm
      title: 考察工具挑战点设计
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-LLM-v2.jpg
      description: "调用大语言模型,使用变量和提示词生成回复"
      version: "3"
      position:
        x: 1760
        y: 263.19999999999993
      parameters:
        fcParamVar:
            knowledgeFCParam: {}
        llmParam:
            - name: modelType
              input:
                type: integer
                value: "1768187121"
            - name: modelName
              input:
                type: string
                value: 豆包·1.8·深度思考
            - name: generationDiversity
              input:
                type: string
                value: balance
            - name: temperature
              input:
                type: float
                value: "0.5"
            - name: topP
              input:
                type: float
                value: "1"
            - name: frequencyPenalty
              input:
                type: float
                value: "0"
            - name: maxTokens
              input:
                type: integer
                value: "4096"
            - name: spCurrentTime
              input:
                type: boolean
                value: false
            - name: spAntiLeak
              input:
                type: boolean
                value: false
            - name: responseFormat
              input:
                type: integer
                value: "2"
            - name: parameters
              input:
                type: object
                properties:
                    max_completion_tokens:
                        type: integer
                        value: "0"
                value: null
            - name: prompt
              input:
                type: string
                value: 考察能力为：{{ability}}
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: |+
                    你是一个人才评估专家，你能够基于需要考察的能力和考察的工具的挑战点来设计适合该工具的关键矛盾。
                    # 输入内容
                    ## 考察工具的挑战点
                    1. 对齐企业战略的挑战
                    要求候选人必须明确引用公司年度重点 / 战略方向（如：数字化、成本优化、客户满意度、新业务拓展等）。
                    不能只谈 “我要成长”，必须说明本职工作如何支撑公司某一条战略落地。
                    测评点：战略理解、组织对齐意识、岗位价值定位。
                    2. 落地到本职工作的颗粒度挑战
                    要求愿景不能空泛，必须拆解到：本职核心职责、可量化的工作成果、具体改进 / 提升方向
                    禁止只谈 “做好本职”，必须有可观察、可评价的行动与目标。
                    测评点：目标清晰度、执行力意识、务实性。
                    3. 个人能力与企业需求匹配的挑战
                    如何弥补岗位短板
                    如何把个人成长转化为岗位绩效 / 团队价值
                    测评点：自我认知、成长动机、学习意识。
                    4. 资源与边界认知挑战
                    实现愿景需要公司 / 部门提供什么支持
                    如何在现有岗位职责边界内创造更大价值
                    如何协同上下游 / 跨部门支撑整体目标
                    测评点：资源意识、协作思维、边界感与大局观。
                    5. 短期贡献与长期发展平衡挑战
                    未来 1 年：为本职 / 部门带来什么直接成果
                    未来 2–3 年：如何成长为更支撑企业战略的角色
                    测评点：长期视角、结果导向。
                    ## 考察能力
                    考察能力为：{{ability}}
                    # 输出要求
                    1. 针对每一个考察的能力设计出1-2个挑战点，每个挑战点不超过80字
                    2. 要结合所考察能力的内涵
                    # 输出要求
                    能力和挑战点都需要有，包括能力名称、能力含义、关键行为、挑战点；
                    # 输出示例
                    示例如下：
                    能力名称：解决问题
                    能力含义：指在面对工作任务中的障碍与挑战时，能够主动识别关键矛盾，运用逻辑分析与创新思维，制定有效策略并协调资源推动实施，最终消除障碍、达成目标的心理特质与行为表现。
                    关键行为：
                    1. 深度剖析：面对复杂工作或突发异常时，能迅速捕捉关键信息，通过数据比对、现场调研等方式深入挖掘问题背后的根本原因，避免主观臆断或仅处理表面现象。
                    2. 科学决策：基于根因分析设计至少 2 种针对性解决方案，评估可行性与风险，协调各方资源确保方案具备落地条件，明确责任分工与时间节点。
                    3. 结果导向：在执行过程中监控关键节点，及时纠偏应对突发状况，确保问题解决彻底，并形成标准化流程或案例沉淀防止复发。
                    挑战点：
                    1. 要求愿景不能是口号，必须拆成阶段目标、时间节点、责任边界
                    2. 要求在愿景中长期部分说明问题解决后，如何形成经验、流程或案例，避免同类问题重复发生。
                    3. 要求不能只写目标和成长，必须结合企业规划，识别本职工作中 1–2 个真实存在的障碍 / 痛点，并说明其对公司目标的影响

            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: ability
              input:
                value:
                    path: ability
                    ref_node: "100001"
        node_outputs:
            output:
                type: string
                value: null
            reasoning_content:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 180000
