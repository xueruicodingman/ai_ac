name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: SSH连接测试
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10s
          script: |
            echo "SSH connected"