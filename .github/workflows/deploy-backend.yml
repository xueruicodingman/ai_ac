name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: 服务器启动FastAPI（gunicorn守护）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/aitalent/backend

            # 杀掉旧进程
            pkill -f gunicorn || true

            # 启动服务（使用服务器已经安装好的依赖）
            nohup /usr/local/python310/bin/python3.10 -m gunicorn -w 1 -k uvicorn.workers.UvicornWorker --threads 1 --timeout 120 src.main:app --bind 0.0.0.0:8000 > run.log 2>&1 &

            sleep 3
            ps -ef | grep gunicorn | grep -v grep