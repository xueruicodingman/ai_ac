name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: SSH连接测试
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10s
          script: |
            echo "SSH connected successfully"

      - name: 检查并安装依赖
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /var/www/aitalent/backend
            free -h
            pip install -r requirements.txt --no-input || pip3.10 install -r requirements.txt --no-input
            python -c "import fastapi, sqlalchemy, langchain" || python3.10 -c "import fastapi, sqlalchemy, langchain" || exit 1

      - name: 重启服务
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            set -e
            cd /var/www/aitalent/backend
            pkill -f "uvicorn\|gunicorn" || true
            sleep 2
            nohup uvicorn src.main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
            sleep 3
            # 验证服务是否启动成功
            curl -sf http://127.0.0.1:8000/docs || { echo "服务启动失败"; cat app.log; exit 1; }