name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: 服务器启动FastAPI（gunicorn守护）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # ==============================
            # 强化 SWAP（确保不被OOM杀死）
            # ==============================
            sudo rm -f /swapfile
            sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile

            # 配置镜像
            mkdir -p ~/.config/pip
            echo -e "[global]\nindex-url=https://pypi.tuna.tsinghua.edu.cn/simple\ntimeout=600" > ~/.config/pip/pip.conf

            cd /var/www/aitalent/backend

            # ==============================
            # 超低内存安装模式（必加）
            # ==============================
            export PIP_NO_CACHE_DIR=1
            export PIP_USER=1

            # 安装依赖（你的正确路径）
            /usr/local/python310/bin/pip3.10 install -r requirements.txt

            # 杀掉旧进程
            pkill -f gunicorn || true

            # ==============================
            # 超低内存启动（关键！）
            # ==============================
            nohup /usr/local/python310/bin/python3.10 -m gunicorn -w 1 -k uvicorn.workers.UvicornWorker --threads 1 --timeout 120 src.main:app --bind 0.0.0.0:8000 > run.log 2>&1 &

            sleep 3
            ps -ef | grep gunicorn | grep -v grep

            # 关闭swap
            sudo swapoff /swapfile
            sudo rm -f /swapfile