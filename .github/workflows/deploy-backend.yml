name: 部署FastAPI到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: 服务器启动FastAPI（gunicorn守护）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 创建4G临时交换内存
            sudo fallocate -l 4G /swapfile || true
            sudo chmod 600 /swapfile || true
            sudo mkswap /swapfile || true
            sudo swapon /swapfile || true
            
            # 配置清华镜像
            mkdir -p ~/.config/pip || true
            echo -e "[global]\nindex-url = https://pypi.tuna.tsinghua.edu.cn/simple\ntimeout = 600\n[install]\ntrusted-host = pypi.tuna.tsinghua.edu.cn" > ~/.config/pip/pip.conf || true
            
            cd /var/www/aitalent/backend
            
            # 安装依赖（保持你原来的正确路径）
            /usr/local/python310/bin/pip3.10 install --user --no-cache-dir -r requirements.txt
            
            # 停止旧进程
            pkill -f "gunicorn" || true
            
            echo "开始启动FastAPI服务..."
            
            # ==========================
            # 【唯一关键修改】-w 4 → -w 1
            # 解决内存不足被杀死的问题
            # ==========================
            nohup /usr/local/python310/bin/python3.10 -m gunicorn -w 1 -k uvicorn.workers.UvicornWorker src.main:app --bind 0.0.0.0:8000 > /var/www/aitalent/backend/run.log 2>&1 &
            
            sleep 3
            ps -ef | grep gunicorn | grep -v grep
            
            # 清理swap
            sudo swapoff /swapfile || true
            sudo rm -f /swapfile || true