name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: SSH连接测试
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10s
          script: |
            echo "SSH connected successfully"

      - name: 重启服务
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            cd /var/www/aitalent/backend
            source venv/bin/activate 2>/dev/null || true
            pkill -f "uvicorn\|gunicorn" || true
            sleep 2
            nohup uvicorn src.main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
            sleep 3
            curl -s http://127.0.0.1:8000/docs | head -c 20