name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: 服务器启动FastAPI
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            cd /var/www/aitalent/backend
            pkill -f "gunicorn.*src.main:app" || true
            sleep 2
            nohup /usr/local/python310/bin/python3.10 -m gunicorn -w 1 -b 0.0.0.0:8000 src.main:app > /var/log/aitalent.log 2>&1 &
            echo "Backend started"
            sleep 3
            curl -s http://localhost:8000/docs > /dev/null && echo "Backend is running" || echo "Backend failed"