name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]  # 只监听后端代码变更

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: 服务器启动FastAPI（gunicorn守护）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # ========== 核心优化1：创建4G临时交换内存（解决内存不足） ==========
            sudo fallocate -l 4G /swapfile || true
            sudo chmod 600 /swapfile || true
            sudo mkswap /swapfile || true
            sudo swapon /swapfile || true
            
            # ========== 核心优化2：配置清华镜像+延长超时（避免下载超时） ==========
            mkdir -p ~/.config/pip || true
            echo -e "[global]\nindex-url = https://pypi.tuna.tsinghua.edu.cn/simple\ntimeout = 300\n[install]\ntrusted-host = pypi.tuna.tsinghua.edu.cn" > ~/.config/pip/pip.conf || true
            
            cd /var/www/aitalent/backend
            
            # ========== 核心优化3：指定Python3.10+禁用pip缓存（减少内存占用） ==========
            /usr/local/python310/bin/pip3 install --user --no-cache-dir -r requirements.txt || true
            
            # 停止旧进程（失败也不中断）
            pkill -f "gunicorn" || true
            
            # 输出启动日志（方便排查）
            echo "开始启动FastAPI服务..."
            
            # ========== 核心优化4：指定Python3.10的gunicorn路径 ==========
            nohup /usr/local/python310/bin/gunicorn -w 4 -k uvicorn.workers.UvicornWorker src.main:app --bind 0.0.0.0:8000 > /var/www/aitalent/backend/run.log 2>&1 &
            
            # 验证进程是否启动
            sleep 3
            ps -ef | grep gunicorn | grep -v grep
            
            # ========== 清理临时内存（可选，释放硬盘空间） ==========
            sudo swapoff /swapfile || true
            sudo rm -f /swapfile || true