name: 部署FastAPI后端到阿里云

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]  # 只监听后端代码变更

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 上传后端代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/*"
          target: "/var/www/aitalent/backend"
          strip_components: 1

      - name: 服务器启动FastAPI（gunicorn守护）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/aitalent/backend
            # 安装后端依赖（加--user避免权限问题，失败也不中断）
            pip3 install --user -r requirements.txt || true
            # 停止旧进程（失败也不中断）
            pkill -f "gunicorn" || true
            # 输出启动日志（方便排查）
            echo "开始启动FastAPI服务..."
            # 启动FastAPI（核心命令：无多余空格，路径正确）
            nohup gunicorn -w 4 -k uvicorn.workers.UvicornWorker src.main:app --bind 0.0.0.0:8000 > /var/www/aitalent/backend/run.log 2>&1 &
            # 验证进程是否启动
            sleep 2
            ps -ef | grep gunicorn | grep -v grep